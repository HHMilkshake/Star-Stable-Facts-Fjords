<script>

let score = 0;
let done = {};

// 🔊 riktig lyd
function playSound(){
    let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}

function q(num, correct){
    if(done[num]) return;

    if(correct){
        score++;
        document.getElementById("r"+num).innerHTML = "Riktig!! 🐴💜";
        playSound(); // 🔊 LYD HER
    } else {
        document.getElementById("r"+num).innerHTML = "Feil 😭";
    }

    done[num] = true;

    document.getElementById("scoreBox").innerHTML =
    "Score: " + score + " / 10";

    fanRank();
}

function fanRank(){
    let text = "";

    if(score <= 3){
        text = "🐴 Ny fjording fan";
    } else if(score <= 6){
        text = "💜 Good fjording fan";
    } else if(score <= 9){
        text = "🔥 Pro fjording fan";
    } else {
        text = "👑 LEGENDARY FJORDING MASTER";
    }

    document.getElementById("scoreBox").innerHTML =
    "Score: " + score + " / 10 — " + text;
}

function choose(color){
    document.getElementById("favArea").innerHTML = `
        <h3>💜 Du valde: ${color}</h3>
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Norwegian_Fjord_horse.jpg">
        <p>Del med din beste venn 🐴✨</p>
    `;
}

</script>
